MEMORY {
    ZP:       file = "",  start = $0082, size = $0050, type = rw;
    BSS_MEM:  file = "",  define = yes, start = $0480, size = $0880, type = rw;
    CODE_MEM: file = %O,  start = $0D00, size = $1300, type = ro, fill = yes;
    RODATA:   file = %O,  start = $8000, size = $4000, type = ro, fill = yes;
}
SEGMENTS {
    ZEROPAGE: load = ZP,       type = zp,  optional = yes;
    BSS:      load = BSS_MEM,  type = bss, optional = yes;
    CODE:     load = CODE_MEM, type = ro;
    HICODE:   load = RODATA,   type = ro,  optional = yes;
    RODATA:   load = RODATA,   type = ro,  optional = yes;
}
